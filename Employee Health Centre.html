  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

G_FIELDS = [\n  { key: 'orgName', label: 'Organization name', ph: 'e.g. TechNova', section: 'Branding' },\n  { key: 'doctorName', label: \"Doctor's name (shown on prescriptions)\", ph: 'e.g. Dr. A. Sharma', section: 'Branding' },\n  { key: 'clientId', label: 'Azure App (client) ID', ph: '00000000-0000-0000-0000-000000000000', section: 'Microsoft 365 sign-in' },\n  { key: 'tenantId', label: 'Directory (tenant) ID', ph: '00000000-0000-0000-0000-000000000000', section: 'Microsoft 365 sign-in' },\n  { key: 'masterItemId', label: 'Employee Master — OneDrive file (item) ID', ph: 'driveItem id of the master .xlsx', section: 'OneDrive Excel (read-only)' },\n  { key: 'masterSheet', label: 'Employee Master — sheet name', ph: 'Sheet1', section: 'OneDrive Excel (read-only)' },\n  { key: 'healthItemId', label: 'Health Checkup — OneDrive file (item) ID', ph: 'driveItem id of the SmartReport .xlsx', section: 'OneDrive Excel (read-only)' },\n  { key: 'healthSheet', label: 'Health Checkup — sheet name', ph: 'Result 1', section: 'OneDrive Excel (read-only)' },\n  { key: 'siteId', label: 'SharePoint Site ID', ph: 'contoso.sharepoint.com,GUID,GUID', section: 'SharePoint list (read / write)' },\n  { key: 'listId', label: 'Doctor Consultations — List ID', ph: 'GUID of the DoctorConsultations list', section: 'SharePoint list (read / write)' },\n];\n\nclass Component extends DCLogic {\n  constructor(props) {\n    super(props);\n    this.cfg = this.loadConfig();\n    this.state = {\n      screen: 'home',\n      gateRole: null, pw: '', pwError: '',\n      setup: null, setupError: '',\n      loading: false, loadMsg: '', loadError: '',\n      dataReady: false,\n      docStep: 'lookup', docQuery: '', docEmpId: null, docError: '',\n      orgView: 'overview', orgEmpId: null, orgSearch: '',\n      hrView: 'overview', hrEmpId: null,\n      form: this.blankForm(),\n      consults: [],\n      toast: '',\n    };\n  }\n\n  loadConfig() {\n    try { const c = JSON.parse(localStorage.getItem(CONFIG_KEY) || 'null'); return (c && c.clientId) ? c : null; } catch (e) { return null; }\n  }\n  isConfigured() { return !!(this.cfg && this.cfg.clientId && this.cfg.masterItemId && this.cfg.healthItemId && this.cfg.siteId && this.cfg.listId); }\n  orgName() { return (this.cfg && this.cfg.orgName) || 'Employee'; }\n  doctorName() { return (this.cfg && this.cfg.doctorName) || 'In-house Doctor'; }\n\n  blankForm() {\n    return {\n      complaint: '', bp: '', pulse: '', weight: '', height: '',\n      diagnosis: '', medicines: [{ name: '', dose: '', freq: '', duration: '' }],\n      diet: '', exercise: '', goalText: '', goalTarget: '', followUp: '', referral: '',\n      goalActions: {},\n    };\n  }\n\n  componentDidMount() {}\n\n  // Sign in + read the two OneDrive workbooks and the SharePoint list. Runs once per session.\n  async ensureData() {\n    if (this.state.dataReady) return true;\n    if (!this.isConfigured()) { this.setState({ loadError: 'App is not set up yet. Run Admin setup first.' }); return false; }\n    const cfg = this.cfg;\n    try {\n      this.setState({ loading: true, loadError: '', loadMsg: 'Signing in to Microsoft 365…' });\n      const token = await this.getToken(cfg);\n      this.setState({ loadMsg: 'Reading OneDrive workbooks…' });\n      const [master, health] = await Promise.all([this.readMaster(cfg, token), this.readHealth(cfg, token)]);\n      this.setState({ loadMsg: 'Reading consultation list…' });\n      const consults = await this.readConsults(cfg, token);\n      this.finishInit(master, health, consults);\n      return true;\n    } catch (e) {\n      console.error('[EHC] load failed:', e);\n      this.setState({ loading: false, loadMsg: '', loadError: (e && e.message) || String(e) });\n      return false;\n    }\n  }\n\n  finishInit(master, health, consults) {\n    this.master = master || [];\n    this.health = health || [];\n    this.stageKeys = ['Cardiac', 'Blood', 'Hepatic', 'Renal', 'Diabetic', 'Vitamin-D', 'Thyroid', 'Cancer'];\n    this.masterById = {}; this.master.forEach(m => this.masterById[m.id] = m);\n    this.healthById = {}; this.health.forEach(h => this.healthById[h.id] = h);\n    this._catSum = null;\n    this.agg = this.computeAgg();\n    this.setState({ dataReady: true, loading: false, loadMsg: '' });\n  }\n\n  // ---------- Microsoft Graph (live mode) ----------\n  loadMsal() {\n    if (window.msal) return Promise.resolve();\n    if (this._msalPromise) return this._msalPromise;\n    this._msalPromise = new Promise((resolve, reject) => {\n      const s = document.createElement('script');\n      s.src = 'https://alcdn.msauth.net/browser/3.7.1/js/msal-browser.min.js';\n      s.onload = () => resolve();\n      s.onerror = () => reject(new Error('Could not load the Microsoft sign-in library. Check your internet connection.'));\n      document.head.appendChild(s);\n    });\n    return this._msalPromise;\n  }\n  async getToken(cfg) {\n    await this.loadMsal();\n    const scopes = ['Files.Read.All', 'Sites.ReadWrite.All', 'User.Read'];\n    if (!this._msal) {\n      this._msal = new msal.PublicClientApplication({\n        auth: { clientId: cfg.clientId, authority: 'https://login.microsoftonline.com/' + cfg.tenantId, redirectUri: location.origin + location.pathname },\n        cache: { cacheLocation: 'sessionStorage' },\n      });\n      await this._msal.initialize();\n    }\n    let account = this._msal.getAllAccounts()[0];\n    if (!account) { const r = await this._msal.loginPopup({ scopes }); account = r.account; }\n    try { const r = await this._msal.acquireTokenSilent({ scopes, account }); return r.accessToken; }\n    catch (e) { const r = await this._msal.acquireTokenPopup({ scopes }); return r.accessToken; }\n  }\n  async gfetch(path, token, opts) {\n    const r = await fetch('https://graph.microsoft.com/v1.0' + path, Object.assign({ headers: Object.assign({ Authorization: 'Bearer ' + token, 'Content-Type': 'application/json' }, (opts && opts.headers) || {}) }, opts || {}));\n    if (!r.ok) throw new Error('Graph ' + ((opts && opts.method) || 'GET') + ' ' + path.split('?')[0] + ' -> ' + r.status + ' ' + (await r.text()).slice(0, 160));\n    return r.status === 204 ? null : r.json();\n  }\n  async readUsedRange(cfg, token, itemId, sheet) {\n    const p = '/me/drive/items/' + itemId + \"/workbook/worksheets('\" + encodeURIComponent(sheet) + \"')/usedRange(valuesOnly=true)?$select=values\";\n    const j = await this.gfetch(p, token);\n    return j.values || [];\n  }\n  serialToDate(s) { const n = Number(s); if (!n || isNaN(n)) return ''; return new Date(Date.UTC(1899, 11, 30) + n * 86400000).toISOString().slice(0, 10); }\n  mapMaster(values) {\n    if (!values.length) return [];\n    const head = values[0].map(x => String(x == null ? '' : x).trim());\n    const ix = n => head.indexOf(n);\n    const c = { id: ix('Employee ID'), name: ix('Employee Name'), desg: ix('Designation'), title: ix('Title'), loc: ix('Location'), doj: ix('Date of Joining'), dob: ix('Date of Birth'), age: ix('Age'), ageR: ix('Age Range'), gen: ix('Gender'), func: ix('Function'), div: ix('Division'), vert: ix('Vertical'), role: ix('Role'), band: ix('Band'), lvl: ix('Level'), qual: ix('Basic Qualification'), zone: ix('Zone'), city: ix('City'), state: ix('State') };\n    const g = (row, i) => (i >= 0 && row[i] != null ? row[i] : '');\n    const out = [];\n    for (let r = 1; r < values.length; r++) {\n      const row = values[r]; if (!row || g(row, c.id) === '') continue;\n      const gen = String(g(row, c.gen));\n      out.push({ id: String(g(row, c.id)), name: String(g(row, c.name)), designation: String(g(row, c.desg)), title: String(g(row, c.title)), location: String(g(row, c.loc)), doj: this.serialToDate(g(row, c.doj)), dob: this.serialToDate(g(row, c.dob)), age: g(row, c.age) ? Math.floor(Number(g(row, c.age))) : '', ageRange: String(g(row, c.ageR)), gender: gen === 'M' ? 'Male' : gen === 'F' ? 'Female' : gen, func: String(g(row, c.func)), division: String(g(row, c.div)), vertical: String(g(row, c.vert)), role: String(g(row, c.role)), band: String(g(row, c.band)), level: String(g(row, c.lvl)), qualification: String(g(row, c.qual)), zone: String(g(row, c.zone)), city: String(g(row, c.city)), state: String(g(row, c.state)) });\n    }\n    return out;\n  }\n  mapHealth(values) {\n    if (!values.length) return [];\n    const head = values[0].map(x => String(x == null ? '' : x).trim());\n    const ix = n => head.indexOf(n);\n    const c = { id: ix('employee_id'), name: ix('customer_name'), gen: ix('gender'), age: ix('age_group'), score: ix('overall_health_score'), risk: ix('overall_risk_category'), stage: ix('risk_stage'), dc: ix('dc_name'), appt: ix('appointment_completed_on'), rep: ix('reports_upload_on'), param: ix('parameters'), val: ix('value'), unit: ix('report_value_unit'), range: ix('normal_range'), rl: ix('risk_level'), cat: ix('category') };\n    const stageCols = ['Cardiac profile - stage', 'Blood profile - stage', 'Hepatic profile - stage', 'Renal profile - stage', 'Diabetic profile - stage', 'Vitamin-D Profile - stage', 'Thyroid Profile - stage', 'Cancer Profile - stage'].map(ix);\n    const sMap = { 'a. Normal': 'N', 'b. Low Risk': 'L', 'c. Medium Risk': 'M', 'd. High Risk': 'H' };\n    const g = (row, i) => (i >= 0 && row[i] != null ? row[i] : '');\n    const num = v => { if (v === '' || v == null) return v; const n = Number(v); return isNaN(n) ? v : Math.round(n * 100) / 100; };\n    const map = {}; const order = [];\n    for (let r = 1; r < values.length; r++) {\n      const row = values[r]; const id = String(g(row, c.id)); if (!id) continue;\n      if (!map[id]) {\n        map[id] = { id, name: String(g(row, c.name)), gender: String(g(row, c.gen)), ageGroup: String(g(row, c.age)), score: num(g(row, c.score)), risk: String(g(row, c.risk)), riskStage: String(g(row, c.stage)), dc: String(g(row, c.dc)), apptOn: String(g(row, c.appt)).slice(0, 10), reportOn: String(g(row, c.rep)).slice(0, 10), st: stageCols.map(i => sMap[String(g(row, i))] || '-'), p: [] };\n        order.push(id);\n      }\n      map[id].p.push([String(g(row, c.cat)), String(g(row, c.param)), num(g(row, c.val)), String(g(row, c.unit)), String(g(row, c.range)), (String(g(row, c.rl)).trim().charAt(0) || '1')]);\n    }\n    return order.map(id => map[id]);\n  }\n  async readMaster(cfg, token) { return this.mapMaster(await this.readUsedRange(cfg, token, cfg.masterItemId, cfg.masterSheet)); }\n  async readHealth(cfg, token) { return this.mapHealth(await this.readUsedRange(cfg, token, cfg.healthItemId, cfg.healthSheet)); }\n  fromListItem(it) {\n    const f = it.fields || {};\n    let meds = [];\n    try { meds = f.Medicines ? JSON.parse(f.Medicines) : []; } catch (e) { meds = f.Medicines ? [{ name: f.Medicines, dose: '', freq: '', duration: '' }] : []; }\n    return { id: 'sp-' + it.id, spId: it.id, empId: String(f.EmployeeID || ''), empName: f.EmployeeName || '', date: (f.VisitDate || '').slice(0, 10), doctor: f.Doctor || 'Dr. In-house', complaint: f.Complaint || '', bp: f.BP || '', pulse: f.Pulse || '', weight: f.Weight || '', height: f.Height || '', bmi: f.BMI || '', diagnosis: f.Diagnosis || '', medicines: meds, diet: f.Diet || '', exercise: f.Exercise || '', goalText: f.GoalText || '', goalTarget: (f.GoalTarget || '').slice(0, 10), goalStatus: f.GoalStatus || (f.GoalText ? 'open' : ''), goalClosedOn: (f.GoalClosedOn || '').slice(0, 10), followUp: (f.FollowUpDate || '').slice(0, 10), referral: f.Referral || '', createdAt: new Date(f.VisitDate || it.createdDateTime || Date.now()).getTime() };\n  }\n  async readConsults(cfg, token) {\n    const j = await this.gfetch('/sites/' + cfg.siteId + '/lists/' + cfg.listId + '/items?expand=fields&$top=2000', token);\n    return (j.value || []).map(it => this.fromListItem(it)).sort((a, b) => b.createdAt - a.createdAt);\n  }\n  consultToFields(c) {\n    return { Title: c.empId + ' · ' + c.date, EmployeeID: c.empId, EmployeeName: c.empName, VisitDate: c.date, Doctor: c.doctor, Complaint: c.complaint, BP: c.bp, Pulse: c.pulse, Weight: c.weight, Height: c.height, BMI: c.bmi, Diagnosis: c.diagnosis, Medicines: JSON.stringify(c.medicines || []), Diet: c.diet, Exercise: c.exercise, GoalText: c.goalText, GoalTarget: c.goalTarget || null, GoalStatus: c.goalStatus, GoalClosedOn: c.goalClosedOn || null, FollowUpDate: c.followUp || null, Referral: c.referral };\n  }\n\n  // ---------- data helpers ----------\n  dstr(ms) { return new Date(ms).toISOString().slice(0, 10); }\n  name(id) { const m = this.masterById[id]; if (m) return m.name; const h = this.healthById[id]; return h ? h.name : id; }\n\n  employeeRecord(id) {\n    const m = this.masterById[id] || null;\n    const h = this.healthById[id] || null;\n    if (!m && !h) return null;\n    return {\n      id,\n      name: (m && m.name) || (h && h.name) || id,\n      designation: m ? m.designation : '',\n      title: m ? m.title : '',\n      location: m ? m.location : (h ? h.city : ''),\n      gender: (m && m.gender) || (h && h.gender) || '',\n      age: m ? m.age : '',\n      ageRange: (m && m.ageRange) || (h && h.ageGroup) || '',\n      dob: m ? m.dob : '',\n      doj: m ? m.doj : '',\n      func: m ? m.func : '',\n      division: m ? m.division : '',\n      band: m ? m.band : '',\n      city: m ? (m.city || m.location) : (h ? h.city : ''),\n      health: h,\n    };\n  }\n\n  empConsults(id) {\n    return this.state.consults.filter(c => c.empId === id).sort((a, b) => (b.createdAt || 0) - (a.createdAt || 0));\n  }\n\n  catMaxLevel(h, catName) {\n    let max = 0;\n    (h.p || []).forEach(p => { if (p[0] === catName) { const l = parseInt(p[5]) || 1; if (l > max) max = l; } });\n    return max;\n  }\n\n  computeAgg() {\n    const emps = this.health;\n    const total = emps.length;\n    const risk = {}, age = {}, gender = {};\n    let scoreSum = 0;\n    const scoreBands = {};\n    emps.forEach(e => {\n      risk[e.risk] = (risk[e.risk] || 0) + 1;\n      age[e.ageGroup] = (age[e.ageGroup] || 0) + 1;\n      gender[e.gender] = (gender[e.gender] || 0) + 1;\n      scoreSum += Number(e.score) || 0;\n      const s = Number(e.score) || 0;\n      const band = s >= 90 ? '90+' : s >= 85 ? '85-89' : s >= 80 ? '80-84' : s >= 75 ? '75-79' : s >= 70 ? '70-74' : '<70';\n      scoreBands[band] = (scoreBands[band] || 0) + 1;\n    });\n    // abnormal readings by parameter\n    const paramAbn = {};\n    let highReadEmp = 0;\n    emps.forEach(e => {\n      let hasHigh = false;\n      (e.p || []).forEach(p => {\n        const l = parseInt(p[5]) || 1;\n        if (l >= 2) paramAbn[p[1]] = (paramAbn[p[1]] || 0) + 1;\n        if (l >= 4) hasHigh = true;\n      });\n      if (hasHigh) highReadEmp++;\n    });\n    const paramTop = Object.entries(paramAbn).sort((a, b) => b[1] - a[1]).slice(0, 10);\n    // category-specific risk (per employee max level)\n    const catStat = (cat) => {\n      let high = 0, med = 0, low = 0, ageC = {}, genC = {};\n      const rows = [];\n      emps.forEach(e => {\n        const lvl = this.catMaxLevel(e, cat);\n        if (lvl === 4) { high++; ageC[e.ageGroup] = (ageC[e.ageGroup] || 0) + 1; genC[e.gender] = (genC[e.gender] || 0) + 1; }\n        else if (lvl === 3) med++;\n        else if (lvl === 2) low++;\n      });\n      // rows: high-risk readings in this category\n      emps.forEach(e => {\n        (e.p || []).forEach(p => {\n          if (p[0] === cat && (parseInt(p[5]) || 1) >= 4)\n            rows.push({ name: e.name, id: e.id, param: p[1], value: p[2], unit: p[3], range: p[4], age: e.ageGroup });\n        });\n      });\n      return { high, med, low, ageC, genC, rows };\n    };\n    const sugar = catStat('Blood Glucose Level');\n    const lipid = catStat('Lipid Profile');\n    const thyroid = catStat('Thyroid Profile');\n    // overall high-risk rows\n    const overallRows = [];\n    emps.forEach(e => {\n      (e.p || []).forEach(p => {\n        if ((parseInt(p[5]) || 1) >= 4) overallRows.push({ name: e.name, id: e.id, param: p[1], value: p[2], unit: p[3], range
